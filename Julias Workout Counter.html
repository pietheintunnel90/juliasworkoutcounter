      background-size: 320px auto;
      background-repeat: repeat;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 1rem;
    }
    .app { width: 100%; max-width: 400px; }
    .section {
      background: #fff;
      border-radius: 18px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      border: 1px solid #e8e6e0;
    }
    .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #999;
      margin-bottom: 4px;
    }
    .total {
      font-size: 56px;
      font-weight: 500;
      color: #1a1a1a;
      line-height: 1;
      margin-bottom: 4px;
      transition: color 0.1s;
    }
    .last {
      font-size: 12px;
      color: #bbb;
      min-height: 18px;
      margin-bottom: 14px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }
    .btn {
      background: #f5f4f0;
      border: 1px solid #e0ddd6;
      border-radius: 10px;
      padding: 14px 0;
      font-size: 18px;
      font-weight: 500;
      cursor: pointer;
      color: #1a1a1a;
      transition: background 0.1s, transform 0.08s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { background: #e3e0d8; transform: scale(0.90); }
    .btn:disabled { opacity: 0.5; }
    .grand-total {
      background: #1a1a1a;
      border-radius: 18px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .grand-total .label { color: #888; margin-bottom: 2px; }
    .grand-total .total { font-size: 52px; color: #fff; margin-bottom: 0; }
    .grand-total .sublabels { display: flex; gap: 14px; margin-top: 4px; }
    .grand-total .sub { font-size: 12px; color: #666; }
    .grand-total .sub span { color: #aaa; }
    .reset {
      display: block;
      width: 100%;
      background: none;
      border: 1px solid #e0ddd6;
      border-radius: 12px;
      padding: 11px;
      font-size: 13px;
      color: #aaa;
      cursor: pointer;
      margin-top: 0;
    }
    .reset:hover { background: #f5f4f0; }
    .share {
      background: #fff;
      border-radius: 18px;
      padding: 1rem 1.25rem;
      border: 1px solid #e8e6e0;
      margin-bottom: 1rem;
    }
    .share-label { font-size: 12px; color: #999; margin-bottom: 8px; }
    .share-url {
      font-size: 12px;
      font-family: monospace;
      background: #f5f4f0;
      border-radius: 8px;
      padding: 8px 10px;
      color: #555;
      word-break: break-all;
      cursor: pointer;
      border: 1px solid #e0ddd6;
      display: block;
    }
    .share-url:hover { background: #eceae3; }
    .copied { color: #3a9d75; font-size: 12px; margin-top: 6px; min-height: 16px; }
    .flash { animation: pop 0.22s ease; }
    @keyframes pop { 0% { transform: scale(1.12); } 100% { transform: scale(1); } }
    .loading { opacity: 0.4; }
  </style>
</head>
<body>
  <div class="app">

    <div class="grand-total">
      <div>
        <p class="label">Gesamt</p>
        <div class="total loading" id="grand-total">—</div>
        <div class="sublabels">
          <p class="sub">Pull Ups <span id="pu-sub">—</span></p>
          <p class="sub">Push Ups <span id="pp-sub">—</span></p>
        </div>
      </div>
    </div>

    <div class="section">
      <p class="label">Pull Ups</p>
      <div class="total loading" id="pu-total">—</div>
      <p class="last" id="pu-last"></p>
      <div class="grid" id="pu-grid"></div>
    </div>

    <div class="section">
      <p class="label">Push Ups</p>
      <div class="total loading" id="pp-total">—</div>
      <p class="last" id="pp-last"></p>
      <div class="grid" id="pp-grid"></div>
    </div>

    <div class="share">
      <p class="share-label">Tippe auf den Link um ihn zu kopieren</p>
      <span class="share-url" id="share-url" onclick="copyLink()">wird geladen…</span>
      <p class="copied" id="copied"></p>
    </div>

    <button class="reset" id="reset-btn">↺ &nbsp;Alles zurücksetzen</button>

  </div>

  <script>
    let token = location.hash.slice(1);
    if (!token) {
      const arr = new Uint8Array(16);
      crypto.getRandomValues(arr);
      token = [...arr].map((b,i) => {
        const h = b.toString(16).padStart(2,'0');
        return [4,6,8,10].includes(i) ? '-' + h : h;
      }).join('');
      location.hash = token;
    }

    const BASE = 'https://www.jsonstore.io/' + token;
    document.getElementById('share-url').textContent = location.href;

    async function getVal(key) {
      try {
        const r = await fetch(BASE + '/' + key);
        const d = await r.json();
        return typeof d.result === 'number' ? d.result : 0;
      } catch { return 0; }
    }

    async function setVal(key, val) {
      await fetch(BASE + '/' + key, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(val)
      });
    }

    function updateGrand(pu, pp) {
      const g = document.getElementById('grand-total');
      g.textContent = pu + pp;
      g.classList.remove('loading');
      document.getElementById('pu-sub').textContent = pu;
      document.getElementById('pp-sub').textContent = pp;
    }

    async function load() {
      const [pu, pp] = await Promise.all([getVal('pullups'), getVal('pushups')]);
      const puEl = document.getElementById('pu-total');
      const ppEl = document.getElementById('pp-total');
      puEl.textContent = pu;
      ppEl.textContent = pp;
      puEl.classList.remove('loading');
      ppEl.classList.remove('loading');
      updateGrand(pu, pp);
    }

    function buildGrid(gridId, totalId, lastId, key) {
      const grid = document.getElementById(gridId);
      for (let i = 1; i <= 10; i++) {
        const btn = document.createElement('button');
        btn.className = 'btn';
        btn.textContent = i;
        btn.addEventListener('click', async () => {
          btn.disabled = true;
          const cur = await getVal(key);
          const next = cur + i;
          await setVal(key, next);
          const el = document.getElementById(totalId);
          el.textContent = next;
          el.classList.remove('flash');
          void el.offsetWidth;
          el.classList.add('flash');
          document.getElementById(lastId).textContent = '+' + i + ' hinzugefügt';
          const otherKey = key === 'pullups' ? 'pushups' : 'pullups';
          const otherId = key === 'pullups' ? 'pp-total' : 'pu-total';
          const other = parseInt(document.getElementById(otherId).textContent) || 0;
          updateGrand(key === 'pullups' ? next : other, key === 'pushups' ? next : other);
          btn.disabled = false;
        });
        grid.appendChild(btn);
      }
    }

    buildGrid('pu-grid', 'pu-total', 'pu-last', 'pullups');
    buildGrid('pp-grid', 'pp-total', 'pp-last', 'pushups');

    document.getElementById('reset-btn').addEventListener('click', async () => {
      if (!confirm('Workout zurücksetzen? Alle Zähler gehen auf 0.')) return;
      await Promise.all([setVal('pullups', 0), setVal('pushups', 0)]);
      document.getElementById('pu-total').textContent = '0';
      document.getElementById('pp-total').textContent = '0';
      document.getElementById('pu-last').textContent = '';
      document.getElementById('pp-last').textContent = '';
      updateGrand(0, 0);
    });

    function copyLink() {
      navigator.clipboard.writeText(location.href).then(() => {
        const el = document.getElementById('copied');
        el.textContent = '✓ Link kopiert!';
        setTimeout(() => el.textContent = '', 2500);
      });
    }

    load();
    setInterval(load, 5000);
  </script>
</body>
</html>
